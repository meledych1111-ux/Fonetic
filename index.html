    function render(pageId) {
        const app = document.getElementById('app');
        if (pagesMap[pageId]) {
            app.innerHTML = pagesMap[pageId];
        } else {
            app.innerHTML = homePage;
        }
        // перепривязка кликов по всем data-page внутри нового контента
        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = link.getAttribute('data-page');
                if (target && pagesMap[target]) render(target);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    // глобальный обработчик для навигации
    document.addEventListener('click', (e) => {
        const link = e.target.closest('[data-page]');
        if (link && link.getAttribute('data-page')) {
            e.preventDefault();
            const target = link.getAttribute('data-page');
            if (pagesMap[target]) render(target);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
